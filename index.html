<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medicore</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --text: #111111;
      --muted: #888888;
      --border: rgba(0,0,0,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .video-wrapper {
      width: min(860px, 92vw);
      aspect-ratio: 16/9;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 24px 64px var(--shadow);
      background: #e8e8e6;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(245, 245, 243, 0.94);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--text);
      margin-bottom: 24px;
      transform: scaleX(0);
      transition: transform 0.8s ease 0.4s;
    }

    .overlay.visible .divider {
      transform: scaleX(1);
    }

    .overlay-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 11vw, 8rem);
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 12px;
      transform: translateY(24px);
      transition: transform 0.9s ease 0.2s, opacity 0.9s ease 0.2s;
      opacity: 0;
    }

    .overlay.visible .overlay-logo {
      transform: translateY(0);
      opacity: 1;
    }

    .overlay-tag {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      transform: translateY(20px);
      transition: transform 0.9s ease 0.45s, opacity 0.9s ease 0.45s;
      opacity: 0;
    }

    .overlay.visible .overlay-tag {
      transform: translateY(0);
      opacity: 1;
    }

    .replay-btn {
      margin-top: 40px;
      padding: 11px 30px;
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: transform 0.9s ease 0.65s, opacity 0.9s ease 0.65s, border-color 0.3s, color 0.3s;
    }

    .overlay.visible .replay-btn {
      transform: translateY(0);
      opacity: 1;
    }

    .replay-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .coming-soon {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 20px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.6s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="logo">Medicore</div>

  <div class="video-wrapper">
    <!-- REEMPLAZA CON TU URL DE GHL MEDIA LIBRARY -->
    <video id="promo" playsinline autoplay muted>
      <source src="https://assets.cdn.filesafe.space/GmtBYsqvxLirMrbdo5IV/media/69e148b712a3b92a681f069b.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="coming-soon">Próximamente</div>

  <div class="overlay" id="overlay">
    <div class="divider"></div>
    <div class="overlay-logo">Medicore</div>
    <div class="overlay-tag">Próximamente</div>
    <button class="replay-btn" onclick="replay()">↺ Ver de nuevo</button>
  </div>

  <script>
    const video   = document.getElementById('promo');
    const overlay = document.getElementById('overlay');

    video.addEventListener('ended', () => {
      overlay.classList.add('visible');
    });

    function replay() {
      overlay.classList.remove('visible');
      video.currentTime = 0;
      video.play();
    }
  </script>

</body>
</html>
